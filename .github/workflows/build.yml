name: Build and Release MicroPython firmware

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi

      - name: Clone MicroPython core
        run: |
          # Use a specific tag for stability (e.g., v1.24.1)
          git clone --depth 1 --branch v1.24.1 https://github.com/micropython/micropython.git src/lib/micropython

      - name: Build mpy-cross
        run: |
          make -C src/lib/micropython/mpy-cross

      - name: Build Tang Nano 4K port (Simulation variant)
        run: |
          make -C src/ports/tang_nano_4k/ SIMULATION=1

      - name: Run Renode tests
        uses: antmicro/renode-test-action@v5
        with:
          tests-to-run: |
            test/tang_nano_4k.robot
            test/test_blink.robot

      - name: Run MicroPython Compliance tests
        run: |
          # The renode-test-action v5 uses a Docker container that has renode installed.
          # However, this step runs on the host (ubuntu-latest).
          # We need to install Renode on the host or run this within a container.
          # Since renode-test-action already runs, we can assume we might need it.
          # For simplicity and to ensure 'renode' is available:
          sudo apt-get update
          sudo apt-get install -y dirmngr gnupg apt-transport-https ca-certificates software-properties-common
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
          echo "deb https://download.mono-project.com/repo/ubuntu stable-focal main" | sudo tee /etc/apt/sources.list.d/mono-official-stable.list
          sudo apt-get update
          wget https://builds.antmicro.com/renode/nightly/renode_latest.deb
          sudo apt-get install -y ./renode_latest.deb
          python3 test/run_compliance.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            src/ports/tang_nano_4k/build/firmware.bin
            src/ports/tang_nano_4k/build/firmware.elf
            COMLIANCE_TESTS.md
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/ports/tang_nano_4k/build/firmware.bin
            src/ports/tang_nano_4k/build/firmware.elf
            COMLIANCE_TESTS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
