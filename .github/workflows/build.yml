name: Build and Release MicroPython firmware

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache ARM GNU Toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: arm-toolchain
          key: arm-toolchain-${{ runner.os }}-10.3-2021.10

      - name: Install ARM GNU Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          wget -q https://developer.arm.com/-/media/files/downloads/gnu-rm/10.3-2021.10/gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
          mkdir -p arm-toolchain
          tar -xj -f gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2 -C arm-toolchain --strip-components=1

      - name: Add ARM Toolchain to PATH
        run: echo "${{ github.workspace }}/arm-toolchain/bin" >> $GITHUB_PATH

      - name: Install FPGA toolchain
        run: |
          wget https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2024-03-31/oss-cad-suite-linux-x64-20240331.tgz
          tar xf oss-cad-suite-linux-x64-20240331.tgz
          echo "${{ github.workspace }}/oss-cad-suite/bin" >> $GITHUB_PATH
          pip install apycula

      - name: Cache MicroPython core
        id: cache-micropython
        uses: actions/cache@v4
        with:
          path: src/lib/micropython
          key: micropython-v1.24.1-${{ runner.os }}-${{ hashFiles('src/ports/tang_nano_4k/mpconfigport.h') }}

      - name: Clone MicroPython core
        if: steps.cache-micropython.outputs.cache-hit != 'true'
        run: |
          # Use a specific tag for stability (e.g., v1.24.1)
          git clone --depth 1 --branch v1.24.1 https://github.com/micropython/micropython.git src/lib/micropython

      - name: Build mpy-cross and Reference Unix Port
        if: steps.cache-micropython.outputs.cache-hit != 'true'
        run: |
          make -C src/lib/micropython/mpy-cross
          make -C src/lib/micropython/ports/unix aarch64=0 MICROPY_PY_SSL=0 MICROPY_PY_BTREE=0 FROZEN_MANIFEST= -j

      - name: Build Tang Nano 4K port (Simulation variant)
        run: |
          make -C src/ports/tang_nano_4k/ SIMULATION=1

      - name: Build Tang Nano 4K port (Hardware variant)
        run: |
          make -C src/ports/tang_nano_4k/ BUILD=build_hw

      - name: Build Tang Nano 4K port (Split Flash variant)
        run: |
          make -C src/ports/tang_nano_4k/ BUILD=build_split SPLIT_FLASH=1

      - name: Build examples bitstreams
        run: |
          mkdir -p dist
          bash build_examples.sh

      - name: Build examples firmware
        run: |
          # 1. Blink
          make -C src/ports/tang_nano_4k/ BUILD=build_blink SPLIT_FLASH=1 FROZEN_MANIFEST=../../../examples/blink/manifest.py EXAMPLE=blink
          cp src/ports/tang_nano_4k/build_blink/firmware_blink_int.bin dist/blink/blink_int.bin
          cp src/ports/tang_nano_4k/build_blink/firmware_blink_ext.bin dist/blink/blink_ext.bin

          # 2. TT Echo
          make -C src/ports/tang_nano_4k/ BUILD=build_tt_echo SPLIT_FLASH=1 FROZEN_MANIFEST=../../../examples/tiny-tapeouts/tt_echo/manifest.py EXAMPLE=tt_echo
          cp src/ports/tang_nano_4k/build_tt_echo/firmware_tt_echo_int.bin dist/tt_echo/tt_echo_int.bin
          cp src/ports/tang_nano_4k/build_tt_echo/firmware_tt_echo_ext.bin dist/tt_echo/tt_echo_ext.bin

          # 3. TT VGA to HDMI
          make -C src/ports/tang_nano_4k/ BUILD=build_tt_vga_hdmi SPLIT_FLASH=1 FROZEN_MANIFEST=../../../examples/tiny-tapeouts/tt_vga_to_hdmi/manifest.py EXAMPLE=tt_vga_hdmi
          cp src/ports/tang_nano_4k/build_tt_vga_hdmi/firmware_tt_vga_hdmi_int.bin dist/tt_vga_hdmi/tt_vga_hdmi_int.bin
          cp src/ports/tang_nano_4k/build_tt_vga_hdmi/firmware_tt_vga_hdmi_ext.bin dist/tt_vga_hdmi/tt_vga_hdmi_ext.bin

          # 4. NEORV32
          make -C src/ports/tang_nano_4k/ BUILD=build_neorv32 SPLIT_FLASH=1 FROZEN_MANIFEST=../../../examples/cpus/neorv32/manifest.py EXAMPLE=neorv32
          cp src/ports/tang_nano_4k/build_neorv32/firmware_neorv32_int.bin dist/neorv32/neorv32_int.bin
          cp src/ports/tang_nano_4k/build_neorv32/firmware_neorv32_ext.bin dist/neorv32/neorv32_ext.bin

          # 5. SERV
          make -C src/ports/tang_nano_4k/ BUILD=build_serv SPLIT_FLASH=1 FROZEN_MANIFEST=../../../examples/cpus/serv_riscv/manifest.py EXAMPLE=serv
          cp src/ports/tang_nano_4k/build_serv/firmware_serv_int.bin dist/serv_riscv/serv_riscv_int.bin
          cp src/ports/tang_nano_4k/build_serv/firmware_serv_ext.bin dist/serv_riscv/serv_riscv_ext.bin

      - name: Prepare base artifacts
        run: |
          mkdir -p dist/base
          cp src/ports/tang_nano_4k/build/firmware.bin dist/firmware_sim.bin
          cp src/ports/tang_nano_4k/build/firmware.elf dist/firmware_sim.elf
          cp src/ports/tang_nano_4k/build_hw/firmware.bin dist/firmware_hw.bin
          cp src/ports/tang_nano_4k/build_hw/firmware.elf dist/firmware_hw.elf
          cp src/ports/tang_nano_4k/build_split/firmware_int.bin dist/base/tang_nano_4k_int.bin
          cp src/ports/tang_nano_4k/build_split/firmware_ext.bin dist/base/tang_nano_4k_ext.bin
          cp src/ports/tang_nano_4k/build_split/firmware.elf dist/firmware_split.elf
          cp src/fpga/bitstream/tang_nano_4k_m3.fs dist/base/tang_nano_4k_m3.fs

      - name: Flatten release artifacts
        run: |
          mkdir -p dist/release
          cp dist/base/* dist/release/
          cp dist/blink/* dist/release/
          cp dist/tt_echo/* dist/release/
          cp dist/tt_vga_hdmi/* dist/release/
          cp dist/neorv32/* dist/release/
          cp dist/serv_riscv/* dist/release/
          cp dist/firmware_hw.bin dist/release/
          cp dist/firmware_sim.bin dist/release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-dist
          path: dist/
          if-no-files-found: error

  test:
    needs: build
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-dist
          path: dist

      - name: Download test result artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*
            COMPLIANCE_TESTS.md
            compliance_output.log
            renode_output.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
