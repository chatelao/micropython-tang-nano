name: Build and Release MicroPython firmware

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: make setup

      - name: Build firmware
        run: make build

      - name: Run Renode tests
        uses: antmicro/renode-test-action@v5
        with:
          tests-to-run: test/*.robot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            src/ports/tang_nano_4k/build/firmware.bin
            src/ports/tang_nano_4k/build/firmware.elf
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/ports/tang_nano_4k/build/firmware.bin
            src/ports/tang_nano_4k/build/firmware.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
