name: Build and Release MicroPython firmware

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi

      - name: Clone MicroPython core
        run: |
          # Use a specific tag for stability (e.g., v1.24.1)
          git clone --depth 1 --branch v1.24.1 https://github.com/micropython/micropython.git src/lib/micropython

      - name: Build mpy-cross
        run: |
          make -C src/lib/micropython/mpy-cross

      - name: Build Tang Nano 4K port (Simulation variant)
        run: |
          make -C src/ports/tang_nano_4k/ SIMULATION=1

      - name: Run Renode tests
        uses: antmicro/renode-test-action@v5
        with:
          tests-to-run: |
            test/tang_nano_4k.robot
            test/test_blink.robot

      - name: Run MicroPython Compliance tests
        run: |
          # Renode is already installed and in PATH from the previous step
          python3 test/run_compliance.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            src/ports/tang_nano_4k/build/firmware.bin
            src/ports/tang_nano_4k/build/firmware.elf
            COMLIANCE_TESTS.md
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/ports/tang_nano_4k/build/firmware.bin
            src/ports/tang_nano_4k/build/firmware.elf
            COMLIANCE_TESTS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
